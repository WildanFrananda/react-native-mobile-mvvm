name: Release & Publish to NPM

on:
  push:
    tags:
      - 'v*.*.*'   # Triggered only on version tags: v1.0.0, v0.2.1, etc.

permissions:
  contents: write  # Needed to create GitHub Releases

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Quality Gate — lint + build on every tagged push
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality Gate (Lint & Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript lint check
        run: npm run lint

      - name: Build package (CJS + ESM + DTS)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Publish to NPM — runs only after quality gate passes
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with NPM registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release — runs after successful NPM publish
  # ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          body: |
            ## What's Changed

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.

            ### Install

            ```bash
            npm install react-native-mobile-mvvm@${{ steps.tag.outputs.version }}
            ```
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
